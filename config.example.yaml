# 复制为 config.yaml 后修改姓名。
name: "刘凯夫"

# 可写字符串或字符串数组。脚本会先用 OCR 校验当前页面标题/正文包含这些关键词。
title_keywords:
  - "汝城县第二中学师德"

# 安全默认：永远不自动点击最后的“提交”按钮。
pause_before_submit: true

# A 选项点击后，如果检测不到选中态，会逐次向左偏移重试。
max_select_retry: 10
retry_left_step_px: 4

# 可选：滚动参数（一般不用改；如果 Windows 下“只下滑一点点”，再启用下面几项）
# scroll_amount: wheel clicks（负数=向下）。值越大滚得越多。参考：-18、-24、-30
# scroll_amount: -24
# scroll_repeats: 每次识别循环滚动几次（例如 2 或 3）
# scroll_repeats: 2
# scroll_focus: 滚动前先点一下小程序区域中心，确保焦点在小程序里（Windows 建议 true）
# scroll_focus: true
# scroll_fallback_pagedown: 滚动后内容没变化时，按一次 PageDown 兜底（Windows 建议 true）
# scroll_fallback_pagedown: true

# 可选：限定桌面微信小程序窗口区域，格式为 x, y, width, height。
# 如果不填，脚本会截取全屏并通过 OCR 查找。
# screen_region: [0, 0, 414, 780]
